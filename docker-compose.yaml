services:
  mysql:
    image: mysql:8.4.8
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: pismo_db
      MYSQL_USER: pismo
      MYSQL_PASSWORD: pismo_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s

  pismo-account:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      CONFIG_PATH: /config/config.json
    volumes:
      - ./config/config.json:/config/config.json:ro

volumes:
  mysql_data:
